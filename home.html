<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Home | Github Issue Tracker </title>

    <!-- tailwind and daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- fontawesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- stylesheet -->
    <link rel="stylesheet" href="style.css">

</head>

<body class="bg-[#F8FAFC] min-h-screen">

    <header class="bg-base-100 shadow-sm">
        <div class="navbar w-11/12 mx-auto">
            <div class="flex-1">
                <div class="flex items-center gap-2">
                    <img class="w-9" src="./assets/github-logo.png" alt="">
                    <h2 class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>
                </div>
            </div>
            <div class="flex gap-2">
                <input id="input-search" type="text" placeholder="Search Issues..." class="input input-bordered w-24 md:w-auto" />
                <div class="dropdown dropdown-end">
                    <button id="search-btn" class="btn btn-primary inline-block"><i class="fa-solid fa-plus"></i> New Issue</button>
                </div>
            </div>
        </div>
    </header>


    <script src="home.js"></script>
</body>

</html>
